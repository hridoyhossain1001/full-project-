<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 50px; }
  .instr-box {
    background: #0b1220; border: 1px solid rgba(148,163,184,0.18); border-radius: 8px;
    padding: 14px; font-family: monospace; font-size: 12px; color: #dbeafe;
    white-space: pre-wrap; word-break: break-all; margin-top: 12px; position: relative;
  }
  /* OLD CSS */
  .copy-btn-old {
    background: rgba(99,102,241,0.16); color: #fff; border: 1px solid rgba(99,102,241,0.22); border-radius: 7px;
    padding: 6px 10px; font-size: 12px; cursor: pointer; float: right; margin-top: -4px;
  }

  /* NEW CSS */
  .copy-btn-new {
    background: #4f46e5; color: #fff; border: 1px solid #6366f1; border-radius: 6px;
    padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
    float: right; margin-top: 18px; margin-right: 8px; position: relative; z-index: 10;
  }
</style>
</head>
<body>

<h3>Old Layout</h3>
<div style="width: 600px;">
  <p>Some text above the box</p>
  <button class="copy-btn-old">Copy</button>
  <button class="copy-btn-old" style="margin-right:6px">Show</button>
  <div class="instr-box">pGwSeH*************UEs8</div>
</div>

<h3>New Layout</h3>
<div style="width: 600px;">
  <p>Some text above the box</p>
  <button class="copy-btn-new">Copy</button>
  <button class="copy-btn-new" style="margin-right:6px">Show</button>
  <div class="instr-box">pGwSeH*************UEs8</div>
</div>

</body>
</html>
